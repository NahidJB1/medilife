<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Profile | MEDeLIFE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/community.css">
    <link rel="stylesheet" href="css/community-profile.css">
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" id="navLogo" class="logo-container">
            <svg width="35" height="35" viewBox="0 0 100 100"><rect x="35" y="10" width="30" height="80" rx="5" fill="#EF4444" /><rect x="10" y="35" width="80" height="30" rx="5" fill="#EF4444" /></svg>
            <div style="font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 700;"><span style="color: #EF4444;">MED</span><span style="color: #000;">e</span><span style="color: #22C55E;">LIFE</span></div>
        </a>
        <ul class="nav-links">
            <li><a href="dashboard.html" title="Dashboard"><i class="fas fa-home"></i></a></li>
            <li><a href="community.html" title="Community"><i class="fas fa-users"></i></a></li>
            <li class="nav-item-relative">
                <a href="#" title="Notifications" onclick="toggleNotifications(event)"><i class="fas fa-bell"></i><span class="notification-badge" id="notifBadge" style="display:none;">0</span></a>
                <div class="notifications-dropdown" id="notifDropdown"><div style="padding: 15px; text-align: center; color: var(--gray);">Loading...</div></div>
            </li>
            <li><a href="#" class="active" title="Profile"><i class="fas fa-user-circle"></i></a></li>
        </ul>
    </nav>

    <div class="main-container profile-layout">
        <div class="profile-main">
            <div class="profile-intro animate-fade-in">
                <div class="profile-avatar-large" style="position:relative;">
                    <img id="profileDisplayPic" src="" style="width:100%; height:100%; border-radius:50%; object-fit:cover; display:none;">
                    <i class="fas fa-user" id="profileDefaultIcon"></i>
                    <label for="avatarUploadBtn" class="avatar-upload-overlay" id="avatarOverlay" style="display:none;"><i class="fas fa-camera"></i></label>
                    <input type="file" id="avatarUploadBtn" hidden accept="image/*" onchange="uploadAvatar(this)">
                </div>

                <div class="profile-titles">
                    <h1 id="profileName">Loading...</h1>
                    <span class="role-badge" id="profileRole">Role</span>
                </div>
                <div class="profile-stats">
                    <span id="followerCount" class="clickable-stat" onclick="openFollowList('followers')">0 Followers</span> • 
                    <span id="followingCount" class="clickable-stat" onclick="openFollowList('following')">0 Following</span>
                </div>
                <p class="profile-bio" id="profileBio">Write a description about yourself...</p>
                
                <div class="profile-tabs">
                    <div class="p-tab active" onclick="switchProfileTab('wall', this)">Profile Wall</div>
                    <div class="p-tab" id="tabAnswers" onclick="switchProfileTab('answers', this)">Answers</div>
                    <div class="p-tab" onclick="switchProfileTab('shared', this)">Shared</div>
                </div>
            </div>

            <div id="feedContainer"><div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading timeline...</div></div>
        </div>

        <div class="profile-sidebar animate-fade-in">
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Personal Detail</h3>
                    <button class="icon-btn edit-btn" id="editCredBtn" style="display:none;" onclick="openEditModal()"><i class="fas fa-pen"></i></button>
                </div>
                <div class="cred-list" id="profileMetaGrid"><div style="color:var(--gray); font-size: 0.85rem;">Loading credentials...</div></div>
            </div>
            
            <div class="sidebar-section">
                <div class="section-header"><h3>Social Links</h3></div>
                <div class="cred-list" id="profileSocialLinks"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="editProfileModal">
        <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                <h2>Edit Personal Detail</h2>
                <button class="btn-close" onclick="closeEditModal()" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="form-group"><label>Bio</label><textarea id="editBio" rows="3"></textarea></div>
            
            <div class="form-group-flex">
                <div class="flex-input"><label>Location</label><input type="text" id="editLocation"></div>
                <select id="privLocation" class="privacy-select"><option value="public">Public</option><option value="followers">Followers</option><option value="private">Only Me</option></select>
            </div>
            
            <div class="form-group-flex">
                <div class="flex-input"><label>Education</label><input type="text" id="editEducation"></div>
                <select id="privEducation" class="privacy-select"><option value="public">Public</option><option value="followers">Followers</option><option value="private">Only Me</option></select>
            </div>

            <div class="form-group-flex">
                <div class="flex-input"><label>Work Experience (Profession)</label><input type="text" id="editProfession"></div>
                <select id="privProfession" class="privacy-select"><option value="public">Public</option><option value="followers">Followers</option><option value="private">Only Me</option></select>
            </div>

            <div class="form-group"><label>Languages Known</label><input type="text" id="editLanguages" placeholder="e.g. English, Malay, Mandarin"></div>
            
            <h4 style="margin: 20px 0 10px; color:var(--dark); font-size:0.95rem;">Social Links</h4>
            <select id="privSocial" class="privacy-select" style="width:100%; margin-bottom:15px; margin-top:0;"><option value="public">Show Links to Public</option><option value="followers">Show Links to Followers</option><option value="private">Only Me</option></select>
            
            <div class="form-group-flex"><div class="flex-input"><label><i class="fab fa-facebook" style="color:#1877F2"></i> Facebook URL</label><input type="text" id="editFb"></div></div>
            <div class="form-group-flex"><div class="flex-input"><label><i class="fab fa-instagram" style="color:#E4405F"></i> Instagram URL</label><input type="text" id="editInsta"></div></div>
            <div class="form-group-flex"><div class="flex-input"><label><i class="fab fa-x-twitter"></i> X URL</label><input type="text" id="editX"></div></div>
            <div class="form-group-flex" style="margin-bottom: 20px;"><div class="flex-input"><label><i class="fab fa-youtube" style="color:#FF0000"></i> YouTube URL</label><input type="text" id="editYt"></div></div>

            <button class="btn-post" onclick="saveProfile()" style="width:100%;">Save Changes</button>
        </div>
    </div>

    <div class="modal-overlay" id="followListModal" onclick="closeFollowModal(event)">
        <div class="modal-content" style="max-width:400px; padding: 0;">
            <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                <h3 id="followModalTitle">Followers</h3>
                <button onclick="document.getElementById('followListModal').classList.remove('active')" style="background:none; border:none; font-size:1.2rem; cursor:pointer;"><i class="fas fa-times"></i></button>
            </div>
            <div id="followListContainer" style="max-height: 400px; overflow-y: auto; padding: 10px;"></div>
        </div>
    </div>

    <div id="toast-box"><i class="fas fa-info-circle"></i> <span id="toast-msg"></span></div>

    <script src="js/community.js"></script>
    <script src="js/community-profile.js"></script>
</body>
</html>
